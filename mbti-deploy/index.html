<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2选手MBTI人格测试</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 粒子背景 -->
    <canvas id="bgCanvas"></canvas>

    <div class="app" id="app">
        <!-- 欢迎页 -->
        <div class="page active" id="page-welcome">
            <div class="welcome-inner">
                <div class="logo-area">
                    <div class="logo-icon">
                        <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
                            <circle cx="30" cy="30" r="28" stroke="#ff4d4d" stroke-width="2"/>
                            <circle cx="30" cy="30" r="6" fill="#ff4d4d"/>
                            <line x1="30" y1="2" x2="30" y2="16" stroke="#ff4d4d" stroke-width="2"/>
                            <line x1="30" y1="44" x2="30" y2="58" stroke="#ff4d4d" stroke-width="2"/>
                            <line x1="2" y1="30" x2="16" y2="30" stroke="#ff4d4d" stroke-width="2"/>
                            <line x1="44" y1="30" x2="58" y2="30" stroke="#ff4d4d" stroke-width="2"/>
                        </svg>
                    </div>
                    <h1 class="title">CS2选手<br>MBTI人格测试</h1>
                    <p class="subtitle">发现你的电竞人格类型</p>
                </div>

                <div class="stats-row">
                    <div class="stat-item">
                        <span class="stat-num">29</span>
                        <span class="stat-label">道测试题</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-num">20</span>
                        <span class="stat-label">位职业选手</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-num">16</span>
                        <span class="stat-label">种人格类型</span>
                    </div>
                </div>

                <div class="tip-box">
                    <p>🎮 测试基于真实CS2游戏场景，结合MBTI人格理论，找出与你最契合的职业选手</p>
                </div>

                <button class="btn-primary" id="btnStart">
                    <span>开始测试</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 答题页 -->
        <div class="page" id="page-test">
            <!-- 顶部进度 -->
            <div class="top-bar">
                <div class="progress-dots" id="progressDots"></div>
                <div class="progress-text">
                    <span id="curIdx">1</span> / <span id="totalCount">25</span>
                </div>
            </div>

            <!-- 题目卡片 -->
            <div class="question-card" id="questionCard">
                <div class="question-dim" id="questionDim">能量倾向 E/I</div>
                <div class="question-text" id="questionText"></div>

                <div class="options" id="optionsContainer"></div>

                <div id="insightTip"></div>
            </div>

            <!-- 底部导航 -->
            <div class="bottom-nav">
                <button class="btn-nav" id="btnPrev" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    上一题
                </button>

                <button class="btn-nav btn-next" id="btnNext" disabled>
                    下一题
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 结果页 -->
        <div class="page" id="page-result">
            <div class="result-inner" id="resultInner">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
